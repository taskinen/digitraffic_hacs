name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (leave empty for auto-increment minor version)'
        required: false
        default: ''
        type: string
      release_notes:
        description: 'Custom release notes (leave empty for auto-generated from commits)'
        required: false
        default: ''
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version
        id: version
        run: |
          # Get manual version input (if provided)
          MANUAL_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$MANUAL_VERSION" ]; then
            # Use manual version (strip 'v' prefix if present)
            VERSION="${MANUAL_VERSION#v}"
            echo "Using manual version: $VERSION"
          else
            # Auto-increment: Get latest v*.*.* tag
            LATEST_TAG=$(git tag -l 'v*.*.*' | sort -V | tail -n1)

            if [ -z "$LATEST_TAG" ]; then
              # No v*.*.* tags exist, start at 1.0.0
              VERSION="1.0.0"
              echo "No v*.*.* tags found, starting at $VERSION"
            else
              # Parse version and increment minor
              LATEST_VERSION="${LATEST_TAG#v}"
              echo "Latest version: $LATEST_VERSION"

              # Split version into components
              MAJOR=$(echo $LATEST_VERSION | cut -d. -f1)
              MINOR=$(echo $LATEST_VERSION | cut -d. -f2)
              PATCH=$(echo $LATEST_VERSION | cut -d. -f3)

              # Increment minor, reset patch
              NEW_MINOR=$((MINOR + 1))
              VERSION="${MAJOR}.${NEW_MINOR}.0"
              echo "Auto-incremented to $VERSION"
            fi
          fi

          # Validate semver format (X.Y.Z)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid version format '$VERSION'. Must be X.Y.Z"
            exit 1
          fi

          # Check if tag already exists
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Error: Tag v$VERSION already exists"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Updating manifest.json to version $VERSION"

          # Update version field in manifest.json
          python << EOF
          import json

          manifest_path = 'custom_components/digitraffic/manifest.json'
          with open(manifest_path, 'r') as f:
              manifest = json.load(f)

          manifest['version'] = '$VERSION'

          with open(manifest_path, 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')

          print(f"✓ Updated manifest.json to version $VERSION")
          EOF

      - name: Generate release notes
        id: release_notes
        run: |
          CUSTOM_NOTES="${{ github.event.inputs.release_notes }}"

          if [ -n "$CUSTOM_NOTES" ]; then
            # Use custom release notes
            echo "Using custom release notes"
            NOTES="$CUSTOM_NOTES"
          else
            # Auto-generate from commits since last tag
            LATEST_TAG=$(git tag -l 'v*.*.*' | sort -V | tail -n1)

            if [ -z "$LATEST_TAG" ]; then
              # No previous tags, use all commits
              echo "Generating release notes from all commits"
              COMMITS=$(git log --pretty=format:"- %s" --no-merges)
            else
              # Get commits since last tag
              echo "Generating release notes since $LATEST_TAG"
              COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
            fi

            if [ -z "$COMMITS" ]; then
              NOTES="Release ${{ steps.version.outputs.version }}"
            else
              NOTES="## Changes

          $COMMITS

          ---
          *Auto-generated from commit history*"
            fi
          fi

          # Save to file for GitHub release
          echo "$NOTES" > release_notes.md
          echo "Generated release notes:"
          cat release_notes.md

      - name: Commit manifest.json changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add custom_components/digitraffic/manifest.json
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const releaseNotes = fs.readFileSync('release_notes.md', 'utf8');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.tag }}',
              name: 'Release ${{ steps.version.outputs.version }}',
              body: releaseNotes,
              draft: false,
              prerelease: ${{ github.event.inputs.prerelease }}
            });

            console.log('✓ Created GitHub release ${{ steps.version.outputs.tag }}');

      - name: Summary
        run: |
          echo "## Release Created Successfully! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Prerelease:** ${{ github.event.inputs.prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify the release at: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "2. HACS users will see version ${{ steps.version.outputs.version }} available for update" >> $GITHUB_STEP_SUMMARY

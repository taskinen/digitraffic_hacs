# Home Assistant Test Configuration for Digitraffic Development
# ============================================================
# This is an optional minimal configuration file for testing.
# To use it, uncomment the volume mount in docker-compose.yml

# Default config
default_config:

# Enable debug logging for the Digitraffic integration
logger:
  default: info
  logs:
    custom_components.digitraffic: debug
    homeassistant.helpers.entity: info
    homeassistant.components.sensor: info

# HTTP configuration (optional, for development)
http:
  # Allow iframe embedding for development
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.0.0.0/8

# Recorder - limit database size for testing
recorder:
  purge_keep_days: 2
  commit_interval: 30

# Enable Home Assistant frontend
frontend:

# Enable configuration via UI
config:

# Enable Home Assistant API
api:

# History tracking
history:

# Logbook
logbook:

# Sun component (useful for testing time-based automations)
sun:

# System Health
system_health:

